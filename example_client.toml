# ═══════════════════════════════════════════════════════════
#  Phoenix Client Configuration
# ═══════════════════════════════════════════════════════════

# remote_addr: The address of the Phoenix server.
#   - Direct:     "SERVER_IP:8080"     (h2c)
#   - Direct TLS: "SERVER_IP:80"      (TLS)
#   - Cloudflare: "your-domain.com:80" (CDN)
remote_addr = "127.0.0.1:8080"

# ═══════════════════════════════════════════════════════════
#  Security
# ═══════════════════════════════════════════════════════════

# ─── TLS Mode ─────────────────────────────────────────────
# Controls how the client handles TLS.
#
#   ""          (omit) → Cleartext h2c. For direct connections to h2c servers.
#   "system"           → HTTPS with OS CA verification. For CDN/Cloudflare only. Read the detailed conditions in the document.
#   "insecure"         → HTTPS but skip cert verification. For direct connections
#                         to servers with self-signed TLS certs (testing only). This mode also allows connection to CDN/Cloudflare, read its conditions in the web document.
#
# tls_mode = "system"

# ─── Custom SNI / SNI Spoofing ────────────────────────────
# custom_sni: An arbitrary SNI value to be sent during the TLS handshake.
# If set, this overrides the actual hostname of the Phoenix server.
# This is a powerful technique to bypass DPI SNI filtering by masquerading as a whitelisted domain (e.g. google.com).
# custom_sni = "google.com"

# ─── TLS Fingerprint Spoofing ─────────────────────────────
# fingerprint: Impersonates a browser's TLS ClientHello to bypass DPI filtering.
# Only effective when TLS is active (tls_mode set, or private_key configured).
#   ""               → Go default (no spoofing)
#   "chrome"         → Chrome Auto
#   "random_chrome"  → Rotates between Chrome versions per connection
#   "chrome_dynamic" → Chrome with dynamic RFC 8701 GREASE randomization (recommended)
#   "firefox"        → Firefox Auto
#   "safari"         → Safari Auto
#   "random"         → Random browser fingerprint per connection
#
# fingerprint = "chrome_dynamic"

# ─── Token Authentication ──────────────────────────────────
# Shared secret. Must match the server's auth_token.
# Generate a token:  ./client -gen-token
#
# auth_token = "your-secret-token-here"

# ─── Key-Based Authentication (Ed25519) ───────────────────
# Generate keys:  ./client -gen-keys
#
# server_public_key: The server's public key (Base64). Enables key pinning.
#   - Required for One-Way TLS and mTLS.
#   - Not needed when using tls_mode = "system" (CDN handles verification).
#
# private_key: Path to the client's Ed25519 private key (PEM).
#   - If set → mTLS mode: client authenticates with its key.
#   - If omitted → One-Way TLS: no client certificate sent.
#
# server_public_key = "SERVER_PUBLIC_KEY..."
# private_key = "client.private.key"

# ─── Quickstart: Which settings for which scenario? ──────
#
#  Scenario                    | tls_mode   | auth_token | keys
#  ──────────────────────────────────────────────────────────────
#  Direct, no security         | (omit)     | (omit)     | (omit)
#  Direct + Token              | (omit)     | ✓          | (omit)
#  Direct + mTLS               | (omit)     | (optional) | ✓ both
#  Direct + One-Way TLS        | (omit)     | (optional) | server_public_key
#  Direct + self-signed TLS    | "insecure" | (optional) | (omit)
#  Cloudflare + Token          | "system"   | ✓          | (omit)

# ═══════════════════════════════════════════════════════════
#  Inbound Listeners
# ═══════════════════════════════════════════════════════════
# Each [[inbounds]] entry opens a local port for a specific protocol.

# ─── SOCKS5 Proxy ─────────────────────────────────────────
[[inbounds]]
protocol = "socks5"
local_addr = "127.0.0.1:1080"
enable_udp = true

# ─── SSH Tunnel ───────────────────────────────────────────
# [[inbounds]]
# protocol = "ssh"
# local_addr = "127.0.0.1:2022"
# auth = "/home/user/.ssh/id_rsa"

# ─── Shadowsocks Proxy ───────────────────────────────────
# [[inbounds]]
# protocol = "shadowsocks"
# local_addr = "127.0.0.1:8388"
# auth = "aes-256-gcm:my-secret-password"

# ═══════════════════════════════════════════════════════════
#  Zombie Connection Recovery
# ═══════════════════════════════════════════════════════════
# Controls how the client detects dead connections and automatically
# reconnects using AWS Full Jitter exponential backoff.
[recovery]
# enabled: Toggle automatic connection recovery.
enabled = true

# error_threshold: Number of errors required to trigger a reconnect.
# Increase for highly unstable networks to prevent excessive resets.
error_threshold = 10

# error_window_s: The rolling time window (in seconds) for counting errors.
error_window_s = 30

# backoff_base_ms: The starting backoff delay (in milliseconds).
backoff_base_ms = 500

# backoff_cap_ms: The maximum backoff delay (in milliseconds).
backoff_cap_ms = 15000

# backoff_jitter: If true, adds random jitter to the delay to mimic
# real browsers and avoid detection by DPI systems.
backoff_jitter = true
